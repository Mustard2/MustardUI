name: Build Blender Extension

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest Blender version
        id: blender-version
        run: |
          LATEST=$(curl -s https://download.blender.org/release/ | grep -Eo 'Blender[0-9]+\.[0-9]+' | sort -V | tail -n1)
          echo "LATEST=$LATEST" >> $GITHUB_ENV

      - name: Download latest Blender
        run: |
          VERSION_URL=$(curl -s https://download.blender.org/release/$LATEST/ | \
            grep -Eo 'blender-[0-9]+\.[0-9]+\.[0-9]+-linux-x64.tar.xz' | \
            sort -V | tail -n1)

          wget https://download.blender.org/release/$LATEST/$VERSION_URL
          tar -xf $VERSION_URL

          BLENDER_DIR=$(tar -tf $VERSION_URL | head -1 | cut -f1 -d"/")
          echo "$PWD/$BLENDER_DIR" >> $GITHUB_PATH

      - name: Verify Blender
        run: blender --version

      - name: Build extension using Blender CLI
        run: |
          blender --background --command extension build

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: blender-extension
          path: |
            *.zip
            dist/**
