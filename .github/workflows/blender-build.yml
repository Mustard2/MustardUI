name: Build & Test Blender Extension

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Download Blender separately
      # -----------------------------
      - name: Get latest Blender version
        run: |
          LATEST=$(curl -s https://download.blender.org/release/ \
            | grep -Eo 'Blender[0-9]+\.[0-9]+' \
            | sort -V \
            | tail -n1)
          echo "LATEST=$LATEST" >> $GITHUB_ENV

      - name: Download and extract Blender
        run: |
          VERSION_FILE=$(curl -s https://download.blender.org/release/$LATEST/ \
            | grep -Eo 'blender-[0-9]+\.[0-9]+\.[0-9]+-linux-x64.tar.xz' \
            | sort -V \
            | tail -n1)
          wget https://download.blender.org/release/$LATEST/$VERSION_FILE
          mkdir blender
          tar -xf $VERSION_FILE -C blender --strip-components=1

      - name: Verify Blender
        run: blender/blender --version

      # -----------------------------
      # Prepare separate build folder
      # -----------------------------
      - name: Prepare build folder
        run: |
          mkdir build
          cp -r * build/
          # Remove blender folder from build folder to avoid recursive zip
          rm -rf build/blender

      # -----------------------------
      # Build extension inside build folder
      # -----------------------------
      - name: Build extension
        run: |
          set -e
          cd build
          echo "🚀 Running Blender build..."
          timeout 120s ../blender/blender --background --command extension build || true

          FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n1)
          if [ -z "$FILE" ]; then
            echo "❌ No extension zip found"
            exit 1
          fi

          echo "📦 Found extension zip: $FILE"

          echo "⏳ Validating zip..."
          if ! unzip -t "$FILE" > /dev/null 2>&1; then
            echo "❌ Archive is invalid/corrupted"
            exit 1
          fi

          echo "✅ Zip is valid"

          # Export absolute path and artifact name
          echo "ARCHIVE=$(realpath "$FILE")" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$(basename "$FILE")" >> $GITHUB_ENV

      # -----------------------------
      # Install and enable extension
      # -----------------------------
      - name: Install and enable extension
        run: |
          EXT_ID=$(grep '^id' blender_manifest.toml | cut -d '"' -f2)
          if [ -z "$EXT_ID" ]; then
            echo "❌ Could not determine extension ID"
            exit 1
          fi

          echo "Installing and enabling extension: $EXT_ID"
          ../blender/blender --background --command extension install-file -r user -e "$ARCHIVE"

      # -----------------------------
      # Upload artifact (only the zip)
      # -----------------------------
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARCHIVE }}
