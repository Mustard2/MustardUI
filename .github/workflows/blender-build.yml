name: Build & Test Blender Extension

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Get latest Blender version
      # -----------------------------
      - name: Get latest Blender version
        run: |
          LATEST=$(curl -s https://download.blender.org/release/ \
            | grep -Eo 'Blender[0-9]+\.[0-9]+' \
            | sort -V \
            | tail -n1)
          echo "LATEST=$LATEST" >> $GITHUB_ENV

      # -----------------------------
      # Download Blender
      # -----------------------------
      - name: Download Blender
        run: |
          VERSION_FILE=$(curl -s https://download.blender.org/release/$LATEST/ \
            | grep -Eo 'blender-[0-9]+\.[0-9]+\.[0-9]+-linux-x64.tar.xz' \
            | sort -V \
            | tail -n1)
          wget https://download.blender.org/release/$LATEST/$VERSION_FILE
          tar -xf $VERSION_FILE
          BLENDER_DIR=$(tar -tf $VERSION_FILE | head -1 | cut -f1 -d"/")
          echo "$PWD/$BLENDER_DIR" >> $GITHUB_PATH

      - name: Verify Blender
        run: blender --version

      # -----------------------------
      # Build extension
      # -----------------------------
      - name: Build extension
        run: |
          set -e
          echo "🚀 Running Blender build..."
          timeout 360s blender --background --command extension build || true
      
          # Pick the zip in root folder
          FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n1)
      
          if [ -z "$FILE" ]; then
            echo "❌ No extension zip found"
            exit 1
          fi
      
          echo "📦 Found extension archive: $FILE"
      
          # Validate zip
          if ! unzip -t "$FILE" > /dev/null 2>&1; then
            echo "❌ Archive is invalid/corrupted"
            exit 1
          fi
      
          echo "✅ Zip is valid"
      
          # Export absolute path for artifact
          echo "ARCHIVE=$(realpath "$FILE")" >> $GITHUB_ENV

      # -----------------------------
      # Install and enable extension
      # -----------------------------
      - name: Install and enable extension
        run: |
          EXT_ID=$(grep '^id' blender_manifest.toml | cut -d '"' -f2)
          if [ -z "$EXT_ID" ]; then
            echo "❌ Could not determine extension ID"
            exit 1
          fi

          echo "Installing and enabling extension: $EXT_ID"
          blender --background --command extension install-file -r user -e "$ARCHIVE"

      # -------------------------------
      # Save the extension as artifact
      # -------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-extension
          path: ${{ env.ARCHIVE }}
