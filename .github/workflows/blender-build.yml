name: Build & Test Blender Extension

on:
  push:
  pull_request:
    branches:
      main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Get latest Blender
      # -----------------------------
      - name: Get latest Blender version
        run: |
          LATEST=$(curl -s https://download.blender.org/release/ \
            | grep -Eo 'Blender[0-9]+\.[0-9]+' \
            | sort -V \
            | tail -n1)

          echo "LATEST=$LATEST" >> $GITHUB_ENV

      - name: Download Blender
        run: |
          VERSION_FILE=$(curl -s https://download.blender.org/release/$LATEST/ \
            | grep -Eo 'blender-[0-9]+\.[0-9]+\.[0-9]+-linux-x64.tar.xz' \
            | sort -V \
            | tail -n1)

          wget https://download.blender.org/release/$LATEST/$VERSION_FILE
          tar -xf $VERSION_FILE

          BLENDER_DIR=$(tar -tf $VERSION_FILE | head -1 | cut -f1 -d"/")
          echo "$PWD/$BLENDER_DIR" >> $GITHUB_PATH

      - name: Verify Blender
        run: blender --version

      # -----------------------------
      # Build extension (no blind kill)
      # -----------------------------
      - name: Build extension
        run: |
          set -e
      
          echo "🚀 Running Blender build (with timeout safeguard)..."
          timeout 360s blender --background --command extension build || true
      
          echo "🔍 Searching for archive..."
          FILE=$(find . -type f -name "*.zip" | head -n 1)
      
          if [ -z "$FILE" ]; then
            echo "❌ No archive found"
            exit 1
          fi
      
          echo "Found: $FILE"
      
          echo "⏳ Waiting for file to finalize..."
      
          # Wait until zip becomes valid (after Blender exits)
          for i in {1..10}; do
            if unzip -t "$FILE" > /dev/null 2>&1; then
              echo "✅ Archive is valid"
              echo "ARCHIVE=$FILE" >> $GITHUB_ENV
              exit 0
            fi
      
            echo "Still invalid... retrying ($i)"
            sleep 2
          done
      
          echo "❌ Archive never became valid"
          exit 1

      # -----------------------------
      # Ensure archive exists
      # -----------------------------
      - name: Verify archive
        run: |
          if [ -z "$ARCHIVE" ]; then
            echo "❌ No valid archive produced"
            exit 1
          fi

      # -----------------------------
      # Install extension (correct CLI)
      # -----------------------------
      - name: Install extension
        run: |
          blender --background --command extension install-file "$ARCHIVE"

      # -----------------------------
      # Enable extension
      # -----------------------------
      - name: Enable extension
        run: |
          EXT_ID=$(grep '^id' blender_manifest.toml | cut -d '"' -f2)

          if [ -z "$EXT_ID" ]; then
            echo "❌ Could not determine extension ID"
            exit 1
          fi

          blender --background --command extension enable "$EXT_ID"

      # -----------------------------
      # Upload artifact
      # -----------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-extension
          path: ${{ env.ARCHIVE }}

